name: Deploy to S3

on:
  push:
    branches:
      - main
      - test-babelquarto-i18n

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: 1.8.27

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install Python dependencies
        run: uv sync

      - name: Install R dependencies
        run: |
          Rscript -e 'install.packages("babelquarto", repos = c("https://ropensci.r-universe.dev", Sys.getenv("RSPM")))'

      - name: Install LaTeX and PDF tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            texlive-latex-recommended \
            texlive-latex-extra \
            texlive-pictures \
            texlive-fonts-recommended \
            inkscape

      - name: Render generated images
        run: site/posts/vae-elbo-loss/images/render_images.sh

      - name: Render Quarto Project
        env:
          BABELQUARTO_CI_URL: http://alexnotes-blog-2026.s3-website-eu-west-1.amazonaws.com
        run: Rscript -e 'babelquarto::render_website("site", site_url = Sys.getenv("BABELQUARTO_CI_URL"))'

      - name: Install AWS CLI
        run: pip install awscli

      - name: Deploy to S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: eu-west-1
        run: |
          aws s3 sync site/_site s3://alexnotes-blog-2026 --delete
          aws s3 cp site/_site s3://alexnotes-blog-2026 \
            --recursive \
            --exclude "*" \
            --include "*.html" \
            --include "*.svg" \
            --cache-control "no-cache, no-store, must-revalidate" \
            --metadata-directive REPLACE
